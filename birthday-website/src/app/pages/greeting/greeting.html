<div class="birthday-container">

  <!-- Balloons -->
  <div class="balloons">
    <span>🎈</span>
    <span>🎈</span>
    <span>🎈</span>
    <span>🎈</span>
  </div>

  <!-- Hearts -->
  <div class="hearts">
    <span>❤️</span>
    <span>❤️</span>
    <span>❤️</span>
  </div>

  <!-- Envelope -->
  <div class="wrapper">
  <div class="envelope" [class.open]="isOpen">

      <div class="flap"></div>

      <div class="letter">

        <h2>Happyyy Birthdayyyyy BestPremduu💕</h2>

        <p>
          You are one of the most special people in my life.
          I made this little website to remind you of all
          the beautiful memories we share ❤️
        </p>

        <button routerLink="/gallery">
          View Our Memories
        </button>

      </div>

    </div>

  </div>

  <!-- Button -->
  <button *ngIf="!isOpen" class="open-btn" (click)="openLetter()">
    Open Letter ✉️
  </button>

</div>
